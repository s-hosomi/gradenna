name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 18 * * *" # nightly (03:00 JST): runs the slow tier too
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAX_PLATFORMS: cpu
  JAX_ENABLE_X64: "1"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --locked
      - name: Fast tests (T1)
        run: uv run pytest -m "not slow" -q
      - name: Convergence tests (T2, nightly only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: uv run pytest -m "slow" -q

  import-smoke:
    # Core install only: catches accidental imports of optional deps
    # (fab/measure extras) from the package root.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --no-dev
      - run: uv run --no-dev python -c "import gradenna; print(len(gradenna.__all__), 'exports')"
